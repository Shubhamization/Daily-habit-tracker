<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Momentum | Login</title>
<!-- Google Fonts: Geist for labels/mono, Inter for headlines/body -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Geist:wght@400;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#c3c0ff",
                        "surface-bright": "#f8f9ff",
                        "outline-variant": "#c7c4d8",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#ffd4a4",
                        "inverse-primary": "#c3c0ff",
                        "on-secondary-fixed": "#002113",
                        "outline": "#777587",
                        "tertiary-fixed": "#ffddb8",
                        "on-background": "#151c25",
                        "secondary-container": "#6cf8bb",
                        "tertiary": "#684000",
                        "surface-container-high": "#e2e8f5",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d4dae7",
                        "surface-container-low": "#eef4ff",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#3525cd",
                        "on-primary-container": "#dad7ff",
                        "secondary": "#006c49",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#2a1700",
                        "error-container": "#ffdad6",
                        "surface-tint": "#4d44e3",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-variant": "#dce3f0",
                        "on-surface": "#151c25",
                        "on-primary-fixed": "#0f0069",
                        "secondary-fixed": "#6ffbbe",
                        "surface-container-highest": "#dce3f0",
                        "background": "#f8f9ff",
                        "surface-container": "#e7eefb",
                        "on-error": "#ffffff",
                        "surface": "#f8f9ff",
                        "on-surface-variant": "#464555",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-fixed-dim": "#ffb95f",
                        "inverse-on-surface": "#eaf1fe",
                        "on-primary-fixed-variant": "#3323cc",
                        "primary-container": "#4f46e5",
                        "tertiary-container": "#885500",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#00714d",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2a313b",
                        "primary-fixed": "#e2dfff",
                        "secondary-fixed-dim": "#4edea3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "edge-margin-desktop": "40px",
                        "container-max": "1200px",
                        "section-gap": "48px",
                        "edge-margin-mobile": "16px",
                        "stack-gap": "12px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-caps": ["Geist"],
                        "mono": ["Geist"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "display": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "mono": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .mesh-gradient {
            background-color: #f8f9ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(53, 37, 205, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(78, 222, 163, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(53, 37, 205, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(78, 222, 163, 0.05) 0px, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="mesh-gradient min-h-screen flex flex-col justify-center items-center text-on-surface p-edge-margin-mobile">
<!-- Auth Container -->
<main class="w-full max-w-[440px] flex flex-col items-center gap-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Branding Header -->
<header class="text-center space-y-2">
<div class="inline-flex items-center justify-center p-3 rounded-xl bg-white shadow-sm border border-outline-variant/30 mb-2">
<span class="material-symbols-outlined text-primary text-[32px]">bolt</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Momentum</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Stay disciplined. Stay consistent.</p>
</header>
<!-- Auth Card -->
<div class="glass-card w-full p-8 md:p-10 rounded-3xl shadow-xl shadow-primary/5">
<form action="#" class="space-y-6" method="POST">
<!-- Social Login -->
<div>
<button class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-white border border-outline-variant hover:bg-surface-container-low transition-all duration-200 rounded-xl active:scale-[0.98]" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-caps text-label-caps text-on-surface">Continue with Google</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/50"></div>
<span class="font-label-caps text-label-caps text-outline">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/50"></div>
</div>
<!-- Input Group: Email -->
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="email">Email address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-[20px]">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-3 bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-lg text-body-lg placeholder:text-outline/50" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:underline decoration-primary/30 underline-offset-4" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-[20px]">lock</span>
</div>
<input class="w-full pl-11 pr-12 py-3 bg-white border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-lg text-body-lg placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="passIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 px-1">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded-lg border-outline-variant text-primary focus:ring-primary/20 cursor-pointer transition-all" id="remember" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Login Button -->
<button class="w-full py-4 bg-primary text-white rounded-xl font-headline-md text-headline-md hover:bg-primary-container transition-all duration-200 shadow-lg shadow-primary/20 active:scale-[0.99] flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Toggle -->
<footer class="text-center">
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 transition-all" href="#">Sign up</a>
</p>
</footer>
</main>
<!-- Background Illustration Elements -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary/5 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[10%] right-[5%] w-96 h-96 bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const passIcon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passIcon.textContent = 'visibility_off';
            } else {
                passInput.type = 'password';
                passIcon.textContent = 'visibility';
            }
        }

        // Simple animation trigger for page elements
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.animate-in');
            elements.forEach((el, index) => {
                el.style.animationDelay = `${index * 100}ms`;
            });
        });
    </script>
</body></html>
